apiVersion: 1

datasources:
  # PostgreSQL data source — for time-series queries and ad-hoc SQL
  - name: ExchangeDB
    type: postgres
    access: proxy
    url: exchangedb:8812
    database: exchangedb
    isDefault: true
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false

  # Prometheus data source — for database metrics monitoring
  - name: ExchangeDB Metrics
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    jsonData:
      timeInterval: 15s

  # Grafana JSON data source — alternative HTTP API
  - name: ExchangeDB JSON
    type: simpod-json-datasource
    access: proxy
    url: http://exchangedb:9000/api/v1/grafana
