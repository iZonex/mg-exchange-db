# Default values for ExchangeDB Helm chart.

# -- Number of replicas (use 1 for standalone mode)
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/izonex/mg-exchange-db
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag (default is the chart appVersion)
  tag: "0.1.2"

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Name override (generated if empty)
  name: ""

# -- Additional pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000

# -- Container security context
securityContext:
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  ports:
    # -- HTTP REST API and Web Console port
    http: 9000
    # -- PostgreSQL wire protocol port
    postgresql: 8812
    # -- ILP (InfluxDB Line Protocol) ingestion port
    ilp: 9009

ingress:
  # -- Enable ingress for HTTP API
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: exchangedb.local
      paths:
        - path: /
          pathType: Prefix
  # -- TLS configuration
  tls: []
  #  - secretName: exchangedb-tls
  #    hosts:
  #      - exchangedb.local

resources:
  requests:
    # -- Memory request
    memory: "256Mi"
    # -- CPU request
    cpu: "250m"
  limits:
    # -- Memory limit
    memory: "2Gi"
    # -- CPU limit
    cpu: "2000m"

persistence:
  # -- Enable persistent storage
  enabled: true
  # -- Storage class (empty string uses default)
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Volume size
  size: 50Gi
  # -- Annotations for the PVC
  annotations: {}

# -- Node selector constraints
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Additional environment variables
env: []
  # - name: RUST_LOG
  #   value: "info"

# -- Environment variables from secrets or configmaps
envFrom: []
  # - secretRef:
  #     name: exchangedb-secrets

monitoring:
  # -- Enable Prometheus monitoring
  enabled: true
  serviceMonitor:
    # -- Create a ServiceMonitor resource (requires Prometheus Operator)
    enabled: false
    # -- Namespace for the ServiceMonitor (defaults to release namespace)
    namespace: ""
    # -- Scrape interval
    interval: "30s"
    # -- Scrape timeout
    scrapeTimeout: "10s"
    # -- Additional labels for the ServiceMonitor
    labels: {}
    # -- Metric relabeling configs
    metricRelabelings: []
    # -- Relabeling configs
    relabelings: []

replication:
  # -- Replication mode: standalone, primary, or replica
  mode: standalone
  primary:
    # -- Hostname of the primary node (required when mode=replica)
    host: ""
    # -- Port for replication on the primary
    port: 9009
  # -- Number of replicas (only used in values-primary-replica.yaml)
  replicas: 0

# -- ExchangeDB configuration file (exchange-db.toml)
config: |
  # ExchangeDB Configuration

  [server]
  # HTTP REST API and Web Console
  http_bind = "0.0.0.0:9000"
  # PostgreSQL wire protocol
  pg_bind = "0.0.0.0:8812"
  # ILP ingestion
  ilp_bind = "0.0.0.0:9009"

  [storage]
  # Data directory
  data_dir = "/data"

  [logging]
  level = "info"

  [memory]
  # Max memory for query processing
  max_query_memory = "512MB"
